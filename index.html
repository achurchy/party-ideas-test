<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party Ideas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223b;
      --accent: #e040fb;
      --accent2: #7c4dff;
      --text: #f0f0ff;
      --muted: #888;
      --border: rgba(255,255,255,0.08);
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, #e040fb, #7c4dff, #40c4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--muted);
      margin-top: 0.5rem;
      font-size: 1rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    /* Input form */
    .add-form {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .add-form input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1.1rem;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input::placeholder { color: var(--muted); }

    .add-form input:focus {
      border-color: var(--accent2);
    }

    .add-form button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: var(--radius);
      padding: 0.85rem 1.3rem;
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      line-height: 1;
    }

    .add-form button:hover { opacity: 0.88; }
    .add-form button:active { transform: scale(0.96); }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .toolbar span {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.78rem;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .clear-btn:hover { color: #ff5252; border-color: #ff5252; }

    /* Idea list */
    #ideas-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .idea-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.1rem;
      transition: border-color 0.2s, transform 0.15s;
      animation: slideIn 0.25s ease;
    }

    .idea-card:hover {
      border-color: rgba(124, 77, 255, 0.4);
      transform: translateY(-1px);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Rank badge */
    .rank {
      min-width: 28px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
    }

    .rank.top1 { color: #ffd700; font-size: 1.1rem; }
    .rank.top2 { color: #c0c0c0; font-size: 1rem; }
    .rank.top3 { color: #cd7f32; font-size: 0.95rem; }

    /* Idea text */
    .idea-text {
      flex: 1;
      font-size: 1rem;
      line-height: 1.4;
      word-break: break-word;
    }

    /* Vote section */
    .vote-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      min-width: 48px;
    }

    .upvote-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      width: 42px;
      height: 42px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      color: var(--text);
    }

    .upvote-btn:hover {
      background: rgba(224, 64, 251, 0.15);
      border-color: var(--accent);
    }

    .upvote-btn:active { transform: scale(0.9); }

    .upvote-btn.voted {
      background: linear-gradient(135deg, rgba(224,64,251,0.25), rgba(124,77,255,0.25));
      border-color: var(--accent2);
    }

    .vote-count {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    .vote-count.has-votes { color: #b39ddb; }

    /* Delete button */
    .delete-btn {
      background: none;
      border: none;
      color: var(--border);
      font-size: 1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s;
      line-height: 1;
    }

    .delete-btn:hover { color: #ff5252; }

    /* Empty state */
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
      font-size: 0.95rem;
    }

    .empty span { display: block; font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.7rem 1.4rem;
      border-radius: 999px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Party Ideas</h1>
      <p>Submit ideas &amp; vote for your favourites</p>
    </header>

    <form class="add-form" id="add-form">
      <input
        type="text"
        id="idea-input"
        placeholder="Add a party idea..."
        maxlength="140"
        autocomplete="off"
      />
      <button type="submit" title="Add idea">+</button>
    </form>

    <div class="toolbar">
      <span id="count-label"></span>
      <button class="clear-btn" id="clear-btn">Clear all</button>
    </div>

    <div id="ideas-list"></div>
  </div>

  <div id="toast"></div>

  <script>
    const STORAGE_KEY = 'party-ideas-v1';

    let ideas = load();

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch { return []; }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
    }

    function sorted() {
      return [...ideas].sort((a, b) => b.votes - a.votes);
    }

    function render() {
      const list = document.getElementById('ideas-list');
      const countLabel = document.getElementById('count-label');
      const s = sorted();

      countLabel.textContent = ideas.length
        ? `${ideas.length} idea${ideas.length === 1 ? '' : 's'}`
        : '';

      if (!ideas.length) {
        list.innerHTML = `<div class="empty"><span>🎉</span>No ideas yet — add the first one!</div>`;
        return;
      }

      list.innerHTML = '';

      s.forEach((idea, index) => {
        const rank = index + 1;
        const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
        const rankLabel = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;

        const card = document.createElement('div');
        card.className = 'idea-card';
        card.dataset.id = idea.id;

        card.innerHTML = `
          <div class="rank ${rankClass}">${rankLabel}</div>
          <div class="idea-text">${escHtml(idea.text)}</div>
          <div class="vote-section">
            <button class="upvote-btn ${idea.voted ? 'voted' : ''}" title="${idea.voted ? 'Remove vote' : 'Upvote'}">
              ${idea.voted ? '▲' : '△'}
            </button>
            <span class="vote-count ${idea.votes > 0 ? 'has-votes' : ''}">${idea.votes}</span>
          </div>
          <button class="delete-btn" title="Remove idea">✕</button>
        `;

        card.querySelector('.upvote-btn').addEventListener('click', () => vote(idea.id));
        card.querySelector('.delete-btn').addEventListener('click', () => remove(idea.id));

        list.appendChild(card);
      });
    }

    function vote(id) {
      const idea = ideas.find(i => i.id === id);
      if (!idea) return;
      if (idea.voted) {
        idea.votes = Math.max(0, idea.votes - 1);
        idea.voted = false;
      } else {
        idea.votes += 1;
        idea.voted = true;
      }
      save();
      render();
    }

    function remove(id) {
      ideas = ideas.filter(i => i.id !== id);
      save();
      render();
    }

    function addIdea(text) {
      if (!text.trim()) return;
      const exists = ideas.some(i => i.text.toLowerCase() === text.trim().toLowerCase());
      if (exists) {
        toast('That idea is already on the list!');
        return;
      }
      ideas.push({ id: Date.now(), text: text.trim(), votes: 0, voted: false });
      save();
      render();
    }

    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    }

    document.getElementById('add-form').addEventListener('submit', e => {
      e.preventDefault();
      const input = document.getElementById('idea-input');
      addIdea(input.value);
      input.value = '';
      input.focus();
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      if (!ideas.length) return;
      if (confirm('Clear all ideas? This cannot be undone.')) {
        ideas = [];
        save();
        render();
      }
    });

    render();
  </script>
</body>
</html>
